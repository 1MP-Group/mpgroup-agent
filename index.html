<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Locator</title>

  <link href="https://fonts.googleapis.com/css2?family=Charter:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="w-full max-w-md bg-white p-6 rounded shadow-md">
    <h1 class="text-2xl font-bold mb-4 text-center text-dark-slate-blue">
      Find an MP Group Licensed Medicare Insurance Agent
    </h1>

    <form id="search-form">

      <label for="state" class="block text-sm font-medium text-gray-700">
        State:
      </label>

      <!-- UPDATED INPUT WITH DROPDOWN AUTOCOMPLETE -->
      <input 
        type="text" 
        id="state" 
        name="state" 
        list="state-list"
        placeholder="Enter state (e.g. VA or Virginia)"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        required
      >

      <!-- DROPDOWN LIST -->
      <datalist id="state-list">
        <option value="Alabama">
        <option value="Alaska">
        <option value="Arizona">
        <option value="Arkansas">
        <option value="California">
        <option value="Colorado">
        <option value="Connecticut">
        <option value="Delaware">
        <option value="Florida">
        <option value="Georgia">
        <option value="Hawaii">
        <option value="Idaho">
        <option value="Illinois">
        <option value="Indiana">
        <option value="Iowa">
        <option value="Kansas">
        <option value="Kentucky">
        <option value="Louisiana">
        <option value="Maine">
        <option value="Maryland">
        <option value="Massachusetts">
        <option value="Michigan">
        <option value="Minnesota">
        <option value="Mississippi">
        <option value="Missouri">
        <option value="Montana">
        <option value="Nebraska">
        <option value="Nevada">
        <option value="New Hampshire">
        <option value="New Jersey">
        <option value="New Mexico">
        <option value="New York">
        <option value="North Carolina">
        <option value="North Dakota">
        <option value="Ohio">
        <option value="Oklahoma">
        <option value="Oregon">
        <option value="Pennsylvania">
        <option value="Rhode Island">
        <option value="South Carolina">
        <option value="South Dakota">
        <option value="Tennessee">
        <option value="Texas">
        <option value="Utah">
        <option value="Vermont">
        <option value="Virginia">
        <option value="Washington">
        <option value="Washington D.C.">
        <option value="West Virginia">
        <option value="Wisconsin">
        <option value="Wyoming">
      </datalist>

      <button 
        type="submit" 
        class="mt-4 w-full btn-indigo py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        style="font-weight: 700;"
      >
        Search
      </button>

    </form>
  </div>

  <!-- Modal -->
  <div id="results-modal" class="fixed inset-0 flex justify-center items-center hidden">
    <div class="modal-content bg-white rounded-lg overflow-hidden shadow-xl transform transition-all sm:max-w-3xl sm:w-full">

      <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:flex sm:items-start">
          <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">

            <h3 class="text-lg leading-6 font-medium text-gray-900">
              MP Group Agents
            </h3>

            <div id="results" class="results-container mt-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4"></div>

          </div>
        </div>
      </div>

      <div class="modal-footer bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
        <button 
          type="button" 
          id="close-modal"
          class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 btn-red text-base font-medium sm:ml-3 sm:w-auto sm:text-sm"
        >
          Close
        </button>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="index.js"></script>

</body>
</html>
